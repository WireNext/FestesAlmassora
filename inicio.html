<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Santa Quiteria 2026</title>
    <link rel="stylesheet" href="style.css">
      <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <div class="bg-blur"></div>

    <main id="app">
        <section id="p-inici" class="page active">
            <header>
                <p class="subtitle">SANTA QUITERIA 2026</p>
                <h1>Inici</h1>
            </header>

            <div class="glass-card countdown" id="timer-wrapper">
                <div id="timer">
                    <div class="t-unit"><span id="days">00</span><label>Dies</label></div>
                    <div class="t-unit"><span id="hours">00</span><label>Hores</label></div>
                    <div class="t-unit"><span id="minutes">00</span><label>Min</label></div>
                    <div class="t-unit"><span id="seconds">00</span><label>Seg</label></div>
                </div>
            </div>

            <div id="seccio-avisos"></div>

            <h2 class="label">ACTES D'AVUI</h2>
            <div class="scroll-x" id="avui-scroll"></div>

            <h2 class="label">EL TEMPS</h2>
            <div class="glass-card weather-expanded">
                <div id="weather-main" onclick="toggleWeatherDetails()">
                    </div>
                <div id="weather-details" style="display: none; margin-top: 20px; border-top: 0.5px solid var(--border); padding-top: 20px;">
                    <p class="label-mini">PREVISIÓ PER HORES</p>
                    <div class="scroll-x" id="hourly-forecast" style="padding: 10px 0;"></div>
                    <p class="label-mini">PRÒXIMS 7 DIES</p>
                    <div id="daily-forecast" class="daily-list"></div>
                    <div class="weather-grid">
                        <div class="weather-box"><label>VENT</label><span id="w-wind">--</span></div>
                        <div class="weather-box"><label>HUMITAT</label><span id="w-humidity">--</span></div>
                        <div class="weather-box"><label>PLUJA</label><span id="w-rain">--</span></div>
                        <div class="weather-box"><label>ÍNDEX UV</label><span id="w-uv">--</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="p-events" class="page">
            <header>
                <p class="subtitle">PROGRAMACIÓ</p>
                <h1>Calendari</h1>
            </header>
            
            <div class="days-selector scroll-x" id="days-tabs" style="padding: 0 20px;"></div>

            <div id="events-list-container" style="padding: 20px;"></div>
        </section>
    </main>

        <div id="event-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="close-modal" onclick="closeModal()">
                        <span>〈</span> Tornar
                    </div>
                    <img id="modal-img" src="" alt="Portada">
                </div>
                <div class="modal-body">
                    <div id="modal-info" class="event-time-badge"></div>
                    <h2 id="modal-titol"></h2>
                    <p id="modal-desc" class="modal-desc"></p>
                    
                    <h3 class="label-mini" style="margin-top: 30px;">UBICACIÓ</h3>
                    <div class="map-container">
                        <iframe 
                            id="modal-map-frame" 
                            width="100%" 
                            height="250" 
                            style="border:0; border-radius: 18px;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                    
                    <a id="modal-map-link" href="" target="_blank" class="btn-map-sec">
                        Obrir en l'App de Mapes ➔
                    </a>
                </div>
            </div>
        </div>

    <nav class="tab-bar">
        <button class="tab active" onclick="showPage('p-inici', this)">🏠</button>
        <button class="tab" onclick="showPage('p-events', this)">📅</button>
        <button class="tab" onclick="window.location.href='bus.html'">🚌</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
